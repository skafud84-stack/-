<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/subsets/Paperlogy-dynamic-subset.css" type="text/css"/>
<title>남령's Pick</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; min-height: 100vh; }

  .header { padding: 48px 20px 32px; text-align: center; border-bottom: 1px solid #eee; }
  .header .sub { font-family: 'Paperlogy', sans-serif; font-weight: 900; font-size: 22px; color: #111; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 12px; }
  .header h1 { font-family: 'Paperlogy', sans-serif; font-weight: 900; font-size: 30px; color: #111; }
  .header .desc { font-size: 13px; color: #888; margin-top: 6px; }

  .nav { padding: 14px 20px; border-bottom: 1px solid #eee; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
  .nav-btn { display: inline-block; padding: 7px 18px; border-radius: 6px; font-size: 12px; font-weight: 700; border: 1.5px solid #ddd; background: #fff; color: #555; cursor: pointer; margin-right: 6px; transition: all 0.15s; }
  .nav-btn:hover { border-color: #111; color: #111; }
  .nav-btn.active { background: #111; color: #fff; border-color: #111; }

  .container { max-width: 500px; margin: 0 auto; padding: 24px 16px; }

  /* 배너 박스 (쿠폰, 검색) */
  .banner { border: 1.5px solid #111; border-radius: 10px; padding: 16px; text-align: center; margin-bottom: 14px; position: relative; cursor: pointer; transition: background 0.15s; }
  .banner:hover { background: #f9f9f9; }
  .banner .label { font-size: 10px; color: #888; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .banner .value { font-size: 20px; font-weight: 900; color: #111; letter-spacing: 1px; }
  .banner .copy-hint { font-size: 10px; color: #bbb; margin-top: 6px; transition: color 0.15s; }
  .banner:hover .copy-hint { color: #111; }
  .banner.copied { background: #111; }
  .banner.copied .label, .banner.copied .value, .banner.copied .copy-hint { color: #fff; }

  .search-banner { border-color: #ddd; }

  /* 영상 */
  .video-section { margin-bottom: 20px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
  .video-section iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
  .video-link { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: #fafafa; border: 1px solid #eee; border-radius: 10px; margin-bottom: 14px; text-decoration: none; color: #111; transition: background 0.15s; }
  .video-link:hover { background: #f0f0f0; }
  .video-icon { font-size: 20px; flex-shrink: 0; }
  .video-text { font-size: 13px; font-weight: 600; }
  .video-arrow { margin-left: auto; color: #999; font-size: 14px; }

  /* LOOK 카드 */
  .look-card { background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
  .look-header { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
  .look-num { width: 26px; height: 26px; border-radius: 6px; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; }
  .look-title { font-size: 13px; font-weight: 800; }
  .look-count { font-size: 11px; color: #bbb; margin-left: auto; }
  .look-body { padding: 6px 16px; }

  .prod-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
  .prod-row + .prod-row { border-top: 1px solid #f5f5f5; }
  .prod-img { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; border: 1px solid #eee; flex-shrink: 0; }
  /* 여러 장 자동 전환 슬라이드 (상의컷 → 하의컷 …) */
  .prod-slide { position: relative; width: 64px; height: 64px; border-radius: 10px; overflow: hidden; border: 1px solid #eee; flex-shrink: 0; }
  .prod-slide img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s ease; }
  .prod-slide img.on { opacity: 1; }
  .prod-placeholder { width: 64px; height: 64px; border-radius: 10px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .prod-info { flex: 1; min-width: 0; }
  .prod-brand { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  .prod-id { font-size: 10px; color: #ccc; }
  .prod-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .prod-price { font-size: 13px; color: #111; font-weight: 800; white-space: nowrap; }
  .buy-btn { padding: 7px 14px; background: #111; color: #fff; border-radius: 6px; font-size: 11px; font-weight: 700; text-decoration: none; flex-shrink: 0; transition: opacity 0.15s; }
  .buy-btn:hover { opacity: 0.7; }

  /* 브랜드 타이틀 (컨텐츠 영역) */
  .brand-title { text-align: center; margin-bottom: 20px; }
  .brand-title h2 { font-family: 'Paperlogy', sans-serif; font-weight: 900; font-size: 24px; color: #111; margin-bottom: 4px; }
  .brand-title .tagline { font-size: 12px; color: #999; }

  /* 편 탭 */
  .part-tabs { display: flex; justify-content: center; gap: 6px; margin-bottom: 18px; }
  .part-btn { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 800; border: 1.5px solid #ddd; background: #fff; color: #555; cursor: pointer; transition: all 0.15s; font-family: 'Paperlogy', sans-serif; }
  .part-btn:hover { border-color: #111; color: #111; }
  .part-btn.active { background: #111; color: #fff; border-color: #111; }

  .empty { text-align: center; padding: 80px 20px; color: #ccc; }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  .footer { text-align: center; padding: 32px 20px; color: #ccc; font-size: 11px; border-top: 1px solid #eee; margin-top: 20px; }
  .footer a { color: #111; text-decoration: none; font-weight: 700; }

  /* SNS 아이콘 */
  .sns-row { display: flex; justify-content: center; gap: 14px; margin-top: 16px; }
  .sns-btn { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1.5px solid #ddd; background: #fff; transition: all 0.15s; }
  .sns-btn:hover { border-color: #111; transform: translateY(-2px); }
  .sns-btn svg { width: 18px; height: 18px; fill: #333; }

  @media (prefers-color-scheme: dark) {
    body { background: #0a0a0a; color: #eee; }
    .header { border-color: #222; }
    .header .sub { color: #fff; }
    .header h1 { color: #fff; }
    .nav { border-color: #222; }
    .nav-btn { background: #111; color: #aaa; border-color: #333; }
    .nav-btn:hover { border-color: #fff; color: #fff; }
    .nav-btn.active { background: #fff; color: #000; border-color: #fff; }
    .banner { border-color: #fff; }
    .banner .value { color: #fff; }
    .banner:hover { background: #1a1a1a; }
    .banner.copied { background: #fff; }
    .banner.copied .label, .banner.copied .value, .banner.copied .copy-hint { color: #000; }
    .look-card { background: #111; border-color: #222; }
    .look-header { border-color: #222; }
    .look-num { background: #fff; color: #000; }
    .prod-row + .prod-row { border-color: #222; }
    .prod-placeholder { background: #1a1a1a; }
    .prod-slide { border-color: #222; }
    .prod-price { color: #eee; }
    .buy-btn { background: #fff; color: #000; }
    .video-link { background: #111; border-color: #222; color: #eee; }
    .video-link:hover { background: #1a1a1a; }
    .footer { border-color: #222; }
    .footer a { color: #fff; }
    .search-banner { border-color: #333; }
    .sns-btn { background: #1a1a1a; border-color: #333; }
    .sns-btn:hover { border-color: #fff; }
    .sns-btn svg { fill: #ccc; }
    .brand-title h2 { color: #fff; }
    .part-btn { background: #1a1a1a; color: #aaa; border-color: #333; }
    .part-btn:hover { border-color: #fff; color: #fff; }
    .part-btn.active { background: #fff; color: #000; border-color: #fff; }
  }
</style>
</head>

  <div class="empty">
    <div class="icon">✦</div>
    <span>대시보드에서 협찬을 추가하면 여기에 자동으로 표시돼요</span>
  </div>

  <p><a href="#">@nam_ryeong</a></p>

<script>
const STORAGE_KEY = 'sponsorship_dashboard_v1';

// 클라우드 발행본(data.json) 우선 — 폰·팔로워 어디서든 동일하게 보임
let CLOUD = null;
function loadItems() {
  if (CLOUD && CLOUD.length) return CLOUD;
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { return []; }
}

function parseLooksGrouped(productList) {
  if (!productList || !productList.trim()) return [];
  const sections = productList.split(/(?=🎀\s*LOOK\s*\d+)/i).filter(s => /🎀/.test(s));
  if (sections.length === 0) return [];
  return sections.map(section => {
    const body = section.replace(/^🎀\s*LOOK\s*\d+\s*/i, '').trim();
    if (!body) return { products: [] };
    const products = []; const lines = body.split('\n'); let cur = null;
    for (const raw of lines) {
      const line = raw.trim(); if (!line) continue;
      if (/^🔗\s*https?:/.test(line)) { if (cur) { const m = line.match(/🔗\s*(https?:\/\/[^\s]+)/); if (m) cur.url = m[1]; } continue; }
      if (/🆔/.test(line) || /\|/.test(line) || /[A-Za-z가-힣]{2,}/.test(line)) {
        if (cur) products.push(cur);
        const brandM = line.match(/^([^|🆔💰]+)/);
        const idM = line.match(/🆔\s*(\d+)/);
        const priceM = line.match(/💰\s*([\d,]+)\s*원/);
        cur = { brand: brandM?brandM[1].trim():'', productId: idM?idM[1]:'', price: priceM?priceM[1]:'', url: '' };
      }
    }
    if (cur) products.push(cur);
    return { products };
  });
}

function getProdImg(it, li, pi) {
  const arr = getProdImgs(it, li, pi);
  return arr[0] || null;
}
// 제품 이미지 전체 배열 (1장이어도 배열)
function getProdImgs(it, li, pi) {
  if (it.prodImages) {
    const v = it.prodImages[li + '_' + pi];
    if (!v) return [];
    return Array.isArray(v) ? v.filter(Boolean) : [v];
  }
  if (it.lookImages) { const v = it.lookImages[li]; const arr = typeof v === 'string' ? [v] : (Array.isArray(v) ? v : []); return arr[pi] ? [arr[pi]] : []; }
  return [];
}

// 검색코드/쿠폰: it 필드 없으면 캡션 텍스트(customCaption)에서 추출
function extractCouponSearch(it) {
  let sk = (it.searchKeywords || '').trim();
  let cp = (it.couponCode || '').trim();
  if (!sk || !cp) {
    const cap = [it.customCaption || '', it.guide || ''].join('\n');
    if (cap.trim()) {
      if (!sk) {
        const m = cap.match(/검색\s*(?:창)?\s*코드\s*[:：]\s*\[?\s*([^\]\n]+?)\s*\]?\s*(?:\n|$)/);
        if (m && m[1].trim() && !/^\[?\s*\]?$/.test(m[1].trim())) sk = m[1].trim();
      }
      if (!cp) {
        const m = cap.match(/쿠폰\s*[:：]\s*\[?\s*([^\]\n]+?)\s*\]?\s*(?:\n|$)/);
        if (m && m[1].trim() && !/^\[?\s*\]?$/.test(m[1].trim())) cp = m[1].trim();
      }
    }
  }
  // 빈 대괄호 [ ] 같은 플레이스홀더 제거
  if (/^\[?\s*\]?$/.test(sk)) sk = '';
  if (/^\[?\s*\]?$/.test(cp)) cp = '';
  return { sk, cp };
}

// 유튜브 ID 추출
function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function copyToClipboard(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    const hint = el.querySelector('.copy-hint');
    if (hint) hint.textContent = '✓ 복사됨!';
    setTimeout(() => {
      el.classList.remove('copied');
      if (hint) hint.textContent = '탭하면 복사';
    }, 1500);
  });
}

let currentItemId = null;
let currentPart = 0; // 0 = 전체, 1 = 1편, 2 = 2편...

function getPartRanges(it) {
  const groups = parseLooksGrouped(it.productList);
  const total = groups.length;
  if (!it.partSplits || it.partSplits.length === 0 || total === 0) return [];
  const splits = [...new Set(it.partSplits)].sort((a, b) => a - b).filter(s => s > 0 && s < total);
  if (splits.length === 0) return [];
  const ranges = [];
  let start = 0;
  splits.forEach((s, i) => {
    ranges.push({ part: i + 1, from: start, to: s - 1 });
    start = s;
  });
  ranges.push({ part: splits.length + 1, from: start, to: total - 1 });
  return ranges;
}

function getUrlItemId() {
  const p = new URLSearchParams(window.location.search);
  return p.get('item') || '';
}

function renderNav() {
  const items = loadItems().filter(it => it.status !== '취소' && it.productList);
  const nav = document.getElementById('navTabs');
  if (items.length === 0) {
    nav.innerHTML = '<span style="font-size:12px;color:#999;padding:4px;">데이터 없음</span>';
    return;
  }
  nav.innerHTML = items.map(it =>
    `<button class="nav-btn ${currentItemId === it.id ? 'active' : ''}" onclick="showItem('${it.id}')">${it.company}</button>`
  ).join('');
  // URL에 ?item=ID가 있으면 그 아이템 먼저 표시
  const urlItemId = getUrlItemId();
  if (urlItemId && items.find(x => x.id === urlItemId)) {
    showItem(urlItemId);
  } else if (!currentItemId || !items.find(x => x.id === currentItemId)) {
    showItem(items[0].id);
  }
}

function showItem(itemId, partNum) {
  currentItemId = itemId;
  const items = loadItems();
  const it = items.find(x => x.id === itemId);
  if (!it) return;

  const ranges = getPartRanges(it);
  const hasParts = ranges.length > 0;

  // partNum 결정
  if (partNum !== undefined) {
    currentPart = partNum;
  } else if (hasParts && currentPart === 0) {
    currentPart = 1; // 편이 있으면 기본 1편
  } else if (!hasParts) {
    currentPart = 0;
  }

  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    const allItems = items.filter(x => x.status !== '취소' && x.productList);
    btn.classList.toggle('active', allItems[i]?.id === itemId);
  });

  const groups = parseLooksGrouped(it.productList);
  const container = document.getElementById('lookbookContent');
  let html = '';

  // 브랜드 타이틀 (헤더에서 이동)
  html += `<div class="brand-title">
    <h2>${it.company}</h2>
    ${it.title ? `<p class="tagline">${it.title}</p>` : ''}
  </div>`;

  // 편 탭 표시
  if (hasParts) {
    html += `<div class="part-tabs">`;
    html += ranges.map(r =>
      `<button class="part-btn ${currentPart === r.part ? 'active' : ''}" onclick="showItem('${itemId}',${r.part})">${r.part}편</button>`
    ).join('');
    html += `</div>`;
  }

  // 현재 편에 해당하는 LOOK 범위
  let fromIdx = 0, toIdx = groups.length - 1;
  if (hasParts && currentPart > 0) {
    const range = ranges.find(r => r.part === currentPart);
    if (range) { fromIdx = range.from; toIdx = range.to; }
  }

  // 검색코드/쿠폰: 필드 우선, 없으면 캡션 텍스트에서 추출
  const cs = extractCouponSearch(it);

  // 검색 키워드
  if (cs.sk) {
    html += `<div class="banner search-banner" onclick="copyToClipboard('${cs.sk.replace(/'/g,"\\'")}', this)">
      <p class="label">검색창 코드</p>
      <p class="value">${cs.sk}</p>
      <p class="copy-hint">탭하면 복사</p>
    </div>`;
  }

  // 쿠폰
  if (cs.cp) {
    html += `<div class="banner" onclick="copyToClipboard('${cs.cp.replace(/'/g,"\\'")}', this)">
      <p class="label">할인 쿠폰</p>
      <p class="value">${cs.cp}</p>
      <p class="copy-hint">탭하면 복사</p>
    </div>`;
  }

  // 공개 영상 링크 (편별 videoLinks 또는 단일 videoLink)
  const vLinks = it.videoLinks || {};
  const videoUrl = hasParts && currentPart > 0
    ? (vLinks[String(currentPart)] || '')
    : (vLinks['0'] || it.videoLink || '');

  if (videoUrl) {
    const ytId = getYouTubeId(videoUrl);
    if (ytId) {
      html += `<div class="video-section"><iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe></div>`;
    } else {
      const isInsta = /instagram\.com/.test(videoUrl);
      const isTiktok = /tiktok\.com/.test(videoUrl);
      const icon = isInsta ? '📸' : isTiktok ? '🎵' : '🎬';
      const label = isInsta ? 'Instagram에서 보기' : isTiktok ? 'TikTok에서 보기' : '영상 보러가기';
      html += `<a href="${videoUrl}" target="_blank" class="video-link">
        <span class="video-icon">${icon}</span>
        <span class="video-text">${label}</span>
        <span class="video-arrow">→</span>
      </a>`;
    }
  }

  // LOOK 카드들 (현재 편 범위만)
  let lookDisplayNum = 0;
  for (let li = fromIdx; li <= toIdx; li++) {
    lookDisplayNum++;
    const look = groups[li];
    if (!look) continue;
    const prods = look.products || [];
    if (prods.length === 0) continue;
    const prodHtml = prods.map((p, pi) => {
      const imgs = getProdImgs(it, li, pi);
      let imgHtml;
      if (imgs.length > 1) {
        // 여러 장 → 3초씩 자동 전환 슬라이드
        imgHtml = `<div class="prod-slide">${imgs.map((src, k) => `<img src="${src}" class="${k === 0 ? 'on' : ''}" alt="">`).join('')}</div>`;
      } else if (imgs.length === 1) {
        imgHtml = `<img src="${imgs[0]}" class="prod-img" alt="">`;
      } else {
        imgHtml = `<div class="prod-placeholder">✦</div>`;
      }
      return `
      <div class="prod-row">
        ${imgHtml}
        <div class="prod-info">
          <p class="prod-brand">${p.brand || '제품'}</p>
          ${p.productId ? `<p class="prod-id">${p.productId}</p>` : ''}
        </div>
        <div class="prod-right">
          ${p.price ? `<span class="prod-price">₩${p.price}</span>` : ''}
          ${p.url ? `<a href="${p.url}" target="_blank" class="buy-btn">구매 →</a>` : ''}
        </div>
      </div>`;
    }).join('');
    html += `
    <div class="look-card">
      <div class="look-header">
        <span class="look-num">${lookDisplayNum}</span>
        <span class="look-title">LOOK ${lookDisplayNum}</span>
        <span class="look-count">${prods.length}</span>
      </div>
      <div class="look-body">${prodHtml}</div>
    </div>`;
  }

  if (html.indexOf('look-card') < 0 && html.indexOf('banner') < 0) {
    html += '<div class="empty"><div class="icon">✦</div><span>데이터 없음</span></div>';
  }
  container.innerHTML = html;
  initSlides();
}

// ── 여러 장 사진 3초씩 자동 전환 ──
let slideTimers = [];
function clearSlides() { slideTimers.forEach(clearInterval); slideTimers = []; }
function initSlides() {
  clearSlides();
  document.querySelectorAll('.prod-slide').forEach(el => {
    const imgs = el.querySelectorAll('img');
    if (imgs.length < 2) return;
    let idx = 0;
    const t = setInterval(() => {
      imgs[idx].classList.remove('on');
      idx = (idx + 1) % imgs.length;
      imgs[idx].classList.add('on');
    }, 3000);
    slideTimers.push(t);
  });
}

// ── 데이터 변경 감지 (바뀔 때만 다시 그림 → 슬라이드 안 끊김) ──
function dataSig(items) {
  return items.map(i => {
    const im = i.prodImages || {};
    const imgSig = Object.keys(im).sort().map(k => k + ':' + (Array.isArray(im[k]) ? im[k].length : 1)).join(',');
    return [i.id, i.company, i.title || '', i.productList || '', imgSig, (i.partSplits || []).join(','), JSON.stringify(i.videoLinks || {}), i.searchKeywords || '', i.couponCode || '', i.customCaption || '', i.guide || '', i.status || ''].join('~');
  }).join('§');
}
let lastSig = null;
function tick() {
  const all = loadItems();
  const sig = dataSig(all);
  if (sig === lastSig) return;
  lastSig = sig;
  renderNav();
  if (currentItemId) showItem(currentItemId);
}
// 클라우드 발행본 불러오기 (있으면 그걸로, 없으면 localStorage)
function fetchCloud() {
  fetch('data.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (Array.isArray(d)) { CLOUD = d; lastSig = null; tick(); } })
    .catch(() => {});
}

renderNav();
lastSig = dataSig(loadItems());
fetchCloud();
window.addEventListener('storage', (e) => { if (e.key === STORAGE_KEY) tick(); });
setInterval(tick, 2000);
setInterval(fetchCloud, 15000); // 발행본 갱신 주기적 반영
</script>
</body>
